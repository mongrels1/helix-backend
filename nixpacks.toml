# Generate the Prisma client before building. Dev dependencies install via the Railway
# variable NPM_CONFIG_INCLUDE=dev on the DEFAULT Nixpacks install step. We intentionally do
# NOT override [phases.install] — a second `npm ci` collides with the Docker cache mount at
# /app/node_modules/.cache and fails with EBUSY.
[phases.build]
cmds = ["npx prisma generate", "npm run build"]
